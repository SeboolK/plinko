<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Idle Money</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="game">
    <h1>💸 Idle Money</h1>

    <div class="money" id="money">0 $</div>

    <button id="clickBtn">💰 Zarabiaj</button>

    <div class="upgrades">
        <h2>Ulepszenia</h2>

        <button class="upgrade" id="upgradeClick">
            +1 / klik (koszt: <span id="costClick">10</span>)
        </button>

        <button class="upgrade" id="upgradeAuto">
            +1 / sek (koszt: <span id="costAuto">25</span>)
        </button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
