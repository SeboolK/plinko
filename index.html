<!DOCTYPE html>
<html lang="pl">
<head>
    <link rel="icon" href="favicon_io/favicon.ico">

    <meta name="google-site-verification" content="A6tJXOBY_pQMZgqZHwpQwx7gQ9hfQ-QUL4RnQgyP0nI" />
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Plinko Play - Gra Online Plinko</title>
    <meta name="description" content="Zagraj w Plinko online! Najlepsza gra typu idle i clicker.">

    <!-- FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- HEADER -->
    <div class="header">
        <h1>🎯 Plinko Play - Gra Online</h1>

        <div class="balance" id="balance">💰 1000 $</div>
    </div>

    <!-- CONTROLS -->
    <div class="controls">

        <div class="control-box">
            <label>Risk</label>
            <select id="risk">
                <option value="low">Low</option>
                <option value="medium" selected>Medium</option>
                <option value="high">High</option>
            </select>
        </div>

        <div class="control-box">
            <label>Rows</label>
            <select id="rows">
                <option value="8">8</option>
                <option value="10" selected>10</option>
                <option value="12">12</option>
            </select>
        </div>

        <div class="control-box">
            <label>Bet</label>
            <input type="number" id="bet" value="10" min="1">
        </div>

        <button id="drop" class="drop-btn">🎯 DROP</button>
    </div>

    <!-- CANVAS -->
    <div class="game-wrapper">
        <canvas id="gameCanvas"></canvas>

        <!-- wynik na środku -->
        <div id="result" class="result">+0 $</div>
    </div>

    <!-- MULTIPLIERS -->
    <div class="multipliers" id="multipliers"></div>

</div>

<script src="script.js"></script>
</body>

<footer>
    <p>© 2026 Plinko Play - Gra online</p>
    <p>Strona rozrywkowa. Brak prawdziwych pieniędzy.</p>
</footer>

</html>
